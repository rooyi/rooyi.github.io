<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Dice Expectation Calculator</title>
</head>
<body>
    <h1>Dice Expectation Calculator</h1>

    <label for="diceSlider">Choose the number of dice (1-10): </label>
    <input type="range" id="diceSlider" min="1" max="10" value="1">
    <span id="diceCount">1</span>

    <div id="diceContainer"></div>

    <button onclick="calculateExpectation()">Calculate Expectation</button>

    <div id="result"></div>

    <script src="script.js"></script>
</body>
</html>
