<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Roller</title>
  <link rel="stylesheet" href="sum.css">
</head>
<body>

  <div class="container">
    <h1>Dice Roller</h1>

    <label for="diceNumber">Number of Dice: </label>
    <input type="range" id="diceNumber" min="1" max="10" value="1">
    <span id="diceValue">1</span>

    <div id="diceContainer"></div>

    <p id="individualExpectedValue"></p>
    <p id="totalExpectedValue"></p>
  </div>

  <script src="sum.js"></script>
</body>
</html>
