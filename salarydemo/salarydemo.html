<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Calculator</title>
    <link rel="stylesheet" href="salarydemo.css">
</head>
<body>

<div id="container">
    <div id="people-container"></div>
    
    <div id="controls">
        <label for="hourlyRate">Hourly Rate:</label>
        <input type="number" id="hourlyRate" min="0" step="0.01" placeholder="Enter hourly rate">

        <label for="bonusAmount">Bonus:</label>
        <input type="number" id="bonusAmount" min="0" step="0.01" placeholder="Enter bonus amount">

        <button onclick="calculateSalary()">Calculate</button>

        <div id="result"></div>
    </div>
</div>

<script src="salarydemo.js"></script>
</body>
</html>
