<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Calculator</title>
    <link rel="stylesheet" href="salarydemo.css">
</head>
<body>

<div id="people-container">
    <div class="person">
        <img src="person.png" alt="Person 1">
        <div class="hours-text">
            Hours: <span id="hours1"></span><br>
            $: <span id="earnings1"></span>
        </div>
    </div>
    <div class="person">
        <img src="person.png" alt="Person 2">
        <div class="hours-text">
            Hours: <span id="hours2"></span><br>
            $: <span id="earnings2"></span>
        </div>
    </div>
    <div class="person">
        <img src="person.png" alt="Person 3">
        <div class="hours-text">
            Hours: <span id="hours3"></span><br>
            $: <span id="earnings3"></span>
        </div>
    </div>
    <div class="person">
        <img src="person.png" alt="Person 4">
        <div class="hours-text">
            Hours: <span id="hours4"></span><br>
            $: <span id="earnings4"></span>
        </div>
    </div>
    <div class="person">
        <img src="person.png" alt="Person 5">
        <div class="hours-text">
            Hours: <span id="hours5"></span><br>
            $: <span id="earnings5"></span>
        </div>
    </div>
</div>

<div id="controls">
    <br>
    <label for="hourlyRate">Hourly Rate:</label>
    <input type="number" id="hourlyRate" min="0" step="0.01" placeholder="Enter hourly rate">

    <label for="bonusAmount">Bonus:</label>
    <input type="number" id="bonusAmount" min="0" step="0.01" placeholder="Enter bonus amount">
    <br><br>

    <button onclick="calculateSalary()">Calculate</button>
</div>

<div id="result">
    <div id="hourlyRateDisplay">Hourly Rate: <span id="hourlyRateValue">0.00</span></div>
    <div id="bonusDisplay">Bonus: <span id="bonusAmountValue">0.00</span></div>
    <div id="totalHours">Total Hours: <span id="totalHoursValue">0</span></div>
    <div id="expectation">Expectation E[aX + b] = <span id="expectationValue">0.00</span></div>
</div>

<script src="salarydemo.js"></script>
</body>
</html>
